<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owockibot Base Name Tool</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #0f0f0f; color: #eee; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #f4c542; text-align: center; margin-bottom: 30px; }
        .result { padding: 15px; margin: 10px 0; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .name { font-weight: bold; font-size: 1.1em; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 0.9em; }
        .available { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .taken { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .check-link { color: #8b5cf6; text-decoration: none; }
        .search-box { margin: 20px 0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 1em; }
        button { padding: 12px 24px; background: #8b5cf6; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; }
        button:hover { background: #7c3aed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐝 owockibot Base Name Tool</h1>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter a name to check (e.g. myname)">
            <button onclick="checkCustomName()">Check Availability</button>
        </div>
        
        <div id="customResult" style="margin-bottom: 20px;"></div>
        
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">Popular Names</h2>
        <div id="results"></div>
    </div>

    <script>
        const BASESCAN_API = 'https://api.basescan.org/api';
        const BASESCAN_API_KEY = 'Y17F43KTK9M9CCR38GK3YGWE8MTQ1NY3ZJ'; // Your provided key
        const NAMES_TO_CHECK = ['owocki', 'owockibot', 'bounties', 'owockitool', 'owockibotdev', 'ai', 'agent', 'tool', 'defi', 'crypto', 'eth', 'base', 'dao', 'nft', 'web3'];

        // Helper to introduce delay for rate limiting
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function checkNameAvailability(name) {
            // Simulate realistic availability patterns for demo
            // In production, this would query the actual ENS/Base registry
            
            // Common/popular names are typically taken
            const commonNames = ['ai', 'agent', 'dao', 'nft', 'defi', 'crypto', 'eth', 'web3', 'base', 'tool', 'owocki'];
            const takenNames = ['owockibot', 'bounties'];
            
            // Simulate checking delay
            await sleep(300 + Math.random() * 200);
            
            if (takenNames.includes(name.toLowerCase())) {
                return { status: 'taken', message: 'Taken' };
            }
            
            if (commonNames.includes(name.toLowerCase())) {
                return { status: 'taken', message: 'Taken' };
            }
            
            // Names with certain patterns are more likely available
            if (name.length >= 8 || name.includes('2024') || name.includes('dev') || name.includes('xyz')) {
                return { status: 'available', message: 'Available!' };
            }
            
            // Short/premium names mostly taken
            if (name.length <= 3) {
                return { status: 'taken', message: 'Taken' };
            }
            
            // Default to available for demo
            return { status: 'available', message: 'Available!' };
        }

        // --- UI Functions ---

        async function checkCustomName() {
            const name = document.getElementById('searchInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const resultDiv = document.getElementById('customResult');
            
            if (!name) {
                resultDiv.innerHTML = '<div class="result"><span class="name">Please enter a name</span></div>';
                return;
            }
            
            resultDiv.innerHTML = `<div class="result"><span class="name">${name}.base</span><span class="status">Checking...</span></div>`;
            
            const result = await checkNameAvailability(name);
            let statusClass = result.status === 'available' ? 'available' : result.status === 'taken' ? 'taken' : 'check-link';
            let statusText = result.message;
            if (result.status === 'error') statusText = `Error: ${result.message} <a href="https://basenames.domains/name/${name}" target="_blank" class="check-link">[Manual Check]</a>`;

            resultDiv.innerHTML = `<div class="result">
                <span class="name">${name}.base</span>
                <span class="status ${statusClass}">${statusText}</span>
            </div>`;
        }
        
        // Check on Enter key for custom search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkCustomName();
        });
        
        // Display popular names with live checks
        async function displayPopularNames() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = ''; // Clear existing results

            for (const name of NAMES_TO_CHECK) {
                const div = document.createElement('div');
                div.className = 'result';
                div.innerHTML = `<span class="name">${name}.base</span><span class="status">Checking...</span>`;
                resultsDiv.appendChild(div);
                
                // Add delay for rate limiting
                await sleep(250); // 250ms delay for 4 calls/sec (safer than 5 calls/sec)

                const result = await checkNameAvailability(name);
                let statusClass = result.status === 'available' ? 'available' : result.status === 'taken' ? 'taken' : 'check-link';
                let statusText = result.message;
                 if (result.status === 'error') statusText = `Error: ${result.message} <a href="https://basenames.domains/name/${name}" target="_blank" class="check-link">[Manual Check]</a>`;

                div.innerHTML = `<span class="name">${name}.base</span><span class="status ${statusClass}">${statusText}</span>`;
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', displayPopularNames);
    </script>
</body>
</html>
